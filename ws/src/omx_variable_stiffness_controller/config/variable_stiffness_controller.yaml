# ============================================================
#  variable_stiffness_controller.yaml
#  SINGLE-ROBOT HARDWARE config for variable stiffness
#  Namespace: /omx  (must match launch file robot_namespace)
# ============================================================

/omx/controller_manager:
  ros__parameters:
    update_rate: 500
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    variable_stiffness_controller:
      type: omx_variable_stiffness_controller/OmxVariableStiffnessController

/omx/variable_stiffness_controller:
  ros__parameters:
    use_sim_time: false

    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    state_interfaces:
      - position
      - velocity
      - effort
    command_interfaces:
      - effort

    root_link: world
    tip_link: end_effector_link
    robot_description_node: "/omx/robot_state_publisher"
    torque_scale: 200.0    # XM430-W350: ~267 theoretical; start conservative

    # ── Trajectory ───────────────────────────────────────────
    start_position: [0.30, 0.02, 0.10]
    end_position:   [0.14, 0.02, 0.10]
    target_orientation: [0.0, 0.5, 0.0]

    homing_duration: 8.0
    move_duration:   15.0
    wait_duration:   3.0

    # ── Homing / Wait impedance ──────────────────────────────
    stiffness_homing: [50.0, 50.0, 50.0]
    damping_default:  [3.0,  3.0,  3.0]
    stiffness_rot:    [15.0, 15.0, 15.0]
    damping_rot:      [0.8,  0.8,  0.8]
    max_rise_rate: 50.0

    # ── Variable Stiffness Profile (51-point bell) ────────────
