

# Controller manager parameters (absolute namespace)
controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    variable_stiffness_controller:
      type: omx_variable_stiffness_controller/OmxVariableStiffnessController

# Variable stiffness controller parameters (absolute namespace)
variable_stiffness_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    state_interfaces:
      - position
      - velocity
      - effort
    command_interfaces:
      - effort

    root_link: world
    tip_link:  end_effector_link 
    robot_description_node: "/omx/robot_state_publisher"
    # Torque scale converts KDL Nm outputs to actuator units.
    # Typical value for XM430-W350 ≈ 267. Use conservative 200-300.
    torque_scale: 1.0    # Sim=1.0; real Dynamixel hardware ≈267.0

    # ── Trajectory ───────────────────────────────────────────
    start_position: [0.10, -0.03, 0.12]
    end_position:   [0.30, -0.03, 0.12]

    # Pitch=0.7 rad (≈40°): moderate downward tilt for pushing
    # objects on a surface ~0.12 m below the EE starting height.
    # Reduce to 0.5 rad for flatter horizontal push.
    target_orientation: [0.0, 0.7, 0.0]

    homing_duration: 5.0
    move_duration:   12.0   # 20 cm in 12 s = 1.67 cm/s
    wait_duration:   3.0

    # ── Homing / Wait impedance ───────────────────────────────
    # Increase homing stiffness/damping to hold against gravity reliably
    stiffness_homing: [50.0, 50.0, 50.0]
    damping_default:  [2.5,  2.5,  2.5]
    # Reasonable rotational stiffness/damping for the gripper/orientation
    stiffness_rot:    [15.0, 15.0, 15.0]
    damping_rot:      [0.8,  0.8,  0.8]
    max_rise_rate: 50.0

    # ── Variable Stiffness Profile (51-point bell) ────────────
    stiffness_profile_x:
      [10.0, 10.099, 10.393, 10.878, 11.546, 12.387, 13.388, 14.532, 15.802, 17.178,
      18.637, 20.158, 21.715, 23.285, 24.842, 26.363, 27.822, 29.198, 30.468, 31.612,
