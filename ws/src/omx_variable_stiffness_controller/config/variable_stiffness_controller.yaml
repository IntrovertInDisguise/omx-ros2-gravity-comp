    # ── Safety / singularity ─────────────────────────────────
    use_joint_space_trajectory: true
    num_trajectory_samples: 100
    min_manipulability_threshold: 0.01
    dls_damping_factor: 0.1

    # ── Joint-space homing / regularization ──────────────────
    homing_joint_K: 25.0
    homing_joint_D: 2.0
    trajectory_joint_reg_K: 15.0
    trajectory_joint_reg_D: 2.0

    singularity_preferred_joints: [0.0, -0.8, 0.8, 0.5]
    singularity_escape_K: 3.0
    singularity_escape_D: 0.3
    singularity_exit_hysteresis: 2.5

    # ── Waypoint deviation ───────────────────────────────────
    waypoint_blend_duration: 2.0
    deviation_publish_threshold: 0.01

    # ── Contact force estimator ──────────────────────────────
    contact_force_filter_alpha: 0.02