      32.613, 31.612, 30.468, 29.198, 27.822, 26.363, 24.842, 23.285, 21.715, 20.158,
      18.637, 17.178, 15.802, 14.532, 13.388, 12.387, 11.546, 10.878, 10.393, 10.099,
      10.0]

    stiffness_profile_y:
      [12.0, 12.063, 12.251, 12.562, 12.99, 13.528, 14.168, 14.901, 15.713, 16.594,
      17.528, 18.501, 19.498, 20.502, 21.499, 22.472, 23.406, 24.287, 25.099, 25.832,
      26.472, 27.01, 27.438, 27.749, 27.937, 28.0, 27.937, 27.749, 27.438, 27.01,
