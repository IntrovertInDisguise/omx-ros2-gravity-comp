      [10.0, 10.099, 10.393, 10.878, 11.546, 12.387, 13.388, 14.532, 15.802, 17.178,
      18.637, 20.158, 21.715, 23.285, 24.842, 26.363, 27.822, 29.198, 30.468, 31.612,
      32.613, 33.454, 34.122, 34.607, 34.901, 35.0, 34.901, 34.607, 34.122, 33.454,
      32.613, 31.612, 30.468, 29.198, 27.822, 26.363, 24.842, 23.285, 21.715, 20.158,
      18.637, 17.178, 15.802, 14.532, 13.388, 12.387, 11.546, 10.878, 10.393, 10.099,
      10.0]

