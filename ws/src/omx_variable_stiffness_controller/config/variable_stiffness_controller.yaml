    use_joint_space_trajectory: false
    num_trajectory_samples: 100
    min_manipulability_threshold: 0.01
    dls_damping_factor: 0.08

    singularity_preferred_joints: [0.0, -0.5, 1.0, 0.5]
    singularity_escape_K: 3.0
    singularity_escape_D: 0.3
    singularity_exit_hysteresis: 2.5

    # ── Contact force estimator ───────────────────────────────
    contact_force_filter_alpha: 0.02


# # ============================================================
# #  variable_stiffness_controller.yaml
# #  RADIAL PUSH TEST — 20 cm, z = 0.12 m, bell-shaped stiffness
# # ============================================================
# #
# #  TRAJECTORY GEOMETRY
# #  -------------------
# #  +X radial line, x=[0.10, 0.30] m, y=-0.03 m, z=0.12 m.
# #  y offset keeps arm off the y=0 singularity plane (≈6° deviation).
# #
# #  WORKSPACE AT ENDPOINTS (simplified 2-link model)
# #  ─────────────────────────────────────────────────
# #  start (x=0.10): 30% reach, q3≈127°  — elbow cramped
# #  end   (x=0.30): 80% reach, q3→0°    — near extension
# #  mid   (x=0.20): 55% reach            — best condition #
# #
# #  Both endpoints have worse Jacobian condition numbers than mid,
# #  for opposite structural reasons.  The bell profile ensures the
# #  spring force is smallest exactly where the arm struggles most,
# #  so DLS has less work to do and data quality stays high.
# #
# #  STIFFNESS BELL  K(s) = K_min + (K_max-K_min)·sin²(πs)
# #  ────────────────────────────────────────────────────────
# #  s=0.0  K=[ 10, 12, 18] N/m   start (elbow-cramped)
# #  s=0.5  K=[ 35, 28, 35] N/m   mid   (peak condition)
# #  s=1.0  K=[ 10, 12, 18] N/m   end   (near-extension)
# #
# #  Kz has a higher floor to fight gravity sag throughout.
# #  Profile generated by generate_push_profile.py.
# # ============================================================

