# ============================================================
#  robot1_gazebo_variable_stiffness.yaml
#  DUAL-GAZEBO config for Robot 1 (Left Arm)
#  Namespace: /robot1  (loaded by the Gazebo ros2_control plugin)
#
#  Based on the proven single-robot gazebo_variable_stiffness.yaml
#  with robot1_ prefix on joints and /robot1 namespace.
# ============================================================

/robot1/controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robot1_variable_stiffness:
      type: omx_variable_stiffness_controller/OmxVariableStiffnessController

/robot1/robot1_variable_stiffness:
  ros__parameters:
    use_sim_time: true

    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    state_interfaces:
      - position
      - velocity
      - effort
    command_interfaces:
      - effort

    root_link: world
    tip_link: end_effector_link
    robot_description_node: "/robot1/robot_state_publisher"
    torque_scale: 1.0

    # ── Trajectory ─────────────────────────────────────────────────────────
    start_position: [0.32, 0.02, 0.15]
    end_position:   [0.19, 0.02, 0.15]
    target_orientation: [0.0, 0.5, 0.0]

    homing_duration: 8.0
    move_duration:   15.0
    wait_duration:   3.0

    # ── Homing / Wait impedance ──────────────────────────────
    stiffness_homing: [15.0, 15.0, 25.0]
    damping_default:  [2.0,  2.0,  3.0]
    stiffness_rot:    [15.0, 15.0, 15.0]
    damping_rot:      [0.8,  0.8,  0.8]
    max_rise_rate: 50.0

