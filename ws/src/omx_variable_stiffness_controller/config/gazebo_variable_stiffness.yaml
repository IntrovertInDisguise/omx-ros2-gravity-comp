    # ── Safety / singularity ─────────────────────────────────
    use_joint_space_trajectory: true
    num_trajectory_samples: 100
    min_manipulability_threshold: 0.01
    dls_damping_factor: 0.1

    # ── Joint-space homing / regularization ──────────────────
    # During HOMING with use_joint_space_trajectory=true, the controller
    # uses pure joint-space PD (not Cartesian impedance) to move to the
    # first waypoint, preventing singularity traversal.
    homing_joint_K: 25.0          # Nm/rad — PD gain during homing
    homing_joint_D: 2.0           # Nms/rad — damping during homing
    # During MOVE phases, a small joint-space tracking term keeps the
    # actual joints near the IK-validated path.
    trajectory_joint_reg_K: 15.0  # Nm/rad — regularization gain (increased for better tracking)
    trajectory_joint_reg_D: 2.0   # Nms/rad — regularization damping

    singularity_preferred_joints: [0.0, -0.8, 0.8, 0.5]
    singularity_escape_K: 3.0
    singularity_escape_D: 0.3
    singularity_exit_hysteresis: 2.5

    # ── Contact force estimator ──────────────────────────────
    contact_force_filter_alpha: 0.02
