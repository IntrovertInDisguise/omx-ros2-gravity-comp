# ============================================================
#  gazebo_variable_stiffness.yaml
#  Gazebo-specific controller_manager config for variable stiffness
#  RADIAL PUSH TEST — 6 cm, z = 0.10 m, 100-waypoint bell profile
# ============================================================
#
#  This file is loaded by the gazebo_ros2_control plugin via the
#  <parameters> tag in the URDF xacro.  ALL controller params must
#  live under /omx/controller_manager so the plugin can set them.

/omx/controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    variable_stiffness_controller:
      type: omx_variable_stiffness_controller/OmxVariableStiffnessController
      # Ensure controller_manager has the essential trajectory params
      # (some environments inject params only under the controller_manager
      # node; duplicating them here guarantees the controller sees them).
      variable_stiffness_controller.start_position: [0.30, 0.02, 0.10]
      variable_stiffness_controller.end_position:   [0.14, 0.02, 0.10]
      variable_stiffness_controller.target_orientation: [0.0, 0.5, 0.0]
      variable_stiffness_controller.num_trajectory_samples: 100
      variable_stiffness_controller.use_joint_space_trajectory: true

/omx/variable_stiffness_controller:
  ros__parameters:
    use_sim_time: true

    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    state_interfaces:
      - position
      - velocity
      - effort
    command_interfaces:
      - effort

    root_link: world
    tip_link: end_effector_link
    robot_description_node: "/omx/robot_state_publisher"
    torque_scale: 1.0

    # ── Trajectory (radial line at z = 10 cm) ────────────────
    # Centered in the best-conditioned workspace zone (sigma_min > 0.05)
    # to avoid near-singular configurations at elbow-cramped and
    # near-extension limits.  6 cm travel, 100 waypoints (0.6 mm/step).
    start_position: [0.30, 0.02, 0.10]
    end_position:   [0.14, 0.02, 0.10]
    target_orientation: [0.0, 0.5, 0.0]

    homing_duration: 8.0
    move_duration:   15.0
    wait_duration:   3.0

    # ── Homing / Wait impedance ──────────────────────────────
    stiffness_homing: [50.0, 50.0, 50.0]
    damping_default:  [3.0,  3.0,  3.0]
    stiffness_rot:    [15.0, 15.0, 15.0]
    damping_rot:      [0.8,  0.8,  0.8]
    max_rise_rate: 50.0

    # ── Variable Stiffness Profile (101-point bell, 100 intervals)
