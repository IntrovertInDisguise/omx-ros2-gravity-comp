# Variable Stiffness Controller Configuration for Robot 1 (Left Arm)
# Independent trajectory and stiffness profiles

/robot1/controller_manager:
  ros__parameters:
    update_rate: 500
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robot1_variable_stiffness:
      type: omx_variable_stiffness_controller/OmxVariableStiffnessController

# Params for robot1 controller - declare in both namespaces due to Gazebo namespace leakage
/robot1/robot1_variable_stiffness:
  ros__parameters:
    # Joint configuration for Robot 1
    joints:
      - robot1_joint1
      - robot1_joint2
      - robot1_joint3
      - robot1_joint4

    state_interfaces:
      - position
      - velocity
      - effort
    command_interfaces:
      - effort

    root_link: world
    tip_link: robot1_link5
    robot_description_node: /robot1/robot_state_publisher
    torque_scale: 200.0

    # Robot 1 trajectory timing parameters
    homing_duration: 8.0
    move_duration: 15.0
    wait_duration: 3.0
    max_rise_rate: 50.0

    # Robot 1 Cartesian waypoints [x, y, z] in meters
    start_position: [0.30, 0.02, 0.10]
    end_position: [0.14, 0.02, 0.10]
    target_orientation: [0.0, 0.5, 0.0]

    # Robot 1 Stiffness parameters
    # HARDWARE LIMITS: Max stiffness = 65 N/m, Max damping = 3 Ns/m
    stiffness_homing: [50.0, 50.0, 50.0]
    stiffness_rot: [15.0, 15.0, 15.0]
    damping_rot: [0.8, 0.8, 0.8]
    damping_default: [3.0, 3.0, 3.0]

    # Safety / singularity
    use_joint_space_trajectory: true
    num_trajectory_samples: 100
    min_manipulability_threshold: 0.01
    dls_damping_factor: 0.1
    homing_joint_K: 25.0
    homing_joint_D: 2.0
    trajectory_joint_reg_K: 15.0
    trajectory_joint_reg_D: 2.0
    singularity_preferred_joints: [0.0, -0.8, 0.8, 0.5]
    singularity_escape_K: 3.0
    singularity_escape_D: 0.3
    singularity_exit_hysteresis: 2.5

    # Waypoint deviation
    waypoint_blend_duration: 2.0
    deviation_publish_threshold: 0.01

    # Contact force estimator
    contact_force_filter_alpha: 0.02

    # Robot 1 stiffness/damping profiles (independent from robot2)
    stiffness_profile_x: []
    stiffness_profile_y: []
    stiffness_profile_z: []
    damping_profile_x: []
    damping_profile_y: []
    damping_profile_z: []

