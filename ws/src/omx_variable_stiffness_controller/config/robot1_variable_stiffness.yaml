      40.447, 41.366, 42.167, 42.830, 43.330, 43.636, 43.330, 42.830, 42.167, 41.366,
      40.447, 39.430, 38.333, 37.175, 35.973, 34.747, 33.507, 32.268, 31.037, 29.831,
      28.663, 27.547, 26.493, 25.516, 24.632, 23.857, 23.202, 22.682, 22.305, 22.077,
