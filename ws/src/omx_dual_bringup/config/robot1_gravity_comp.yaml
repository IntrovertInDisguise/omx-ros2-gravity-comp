/robot1/controller_manager:
  ros__parameters:
    update_rate: 500
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robot1_gravity_comp:
      type: omx_gravity_comp_controller/OmxGravityCompController

# Params for robot1 controller - declare in both namespaces due to Gazebo namespace leakage
/robot1/robot1_gravity_comp:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
    root_link: world
    tip_link: end_effector_link
    torque_scale: 200.0
    robot_description_node: /robot1/robot_state_publisher

/robot2/robot1_gravity_comp:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
    root_link: world
    tip_link: end_effector_link
    torque_scale: 200.0
    robot_description_node: /robot1/robot_state_publisher

# Also need robot2 controller params from this YAML since both files are loaded in shared process
/robot1/robot2_gravity_comp:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
    root_link: world
    tip_link: end_effector_link
    torque_scale: 200.0
    robot_description_node: /robot2/robot_state_publisher

/robot2/robot2_gravity_comp:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
    root_link: world
    tip_link: end_effector_link
    torque_scale: 200.0
    robot_description_node: /robot2/robot_state_publisher
