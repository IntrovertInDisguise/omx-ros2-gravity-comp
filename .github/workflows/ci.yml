name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.4.0
        with:
          ros-distro: humble

      - name: Prepare Python venv and install test deps
        run: |
          chmod +x ./scripts/setup_python_env.sh || true
          ./scripts/setup_python_env.sh
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install system deps (colcon)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-rosdep
          sudo rosdep init || true
          rosdep update || true

      - name: Install ROS package dependencies
        run: |
          # assume workspace sources are in ws/src
          rosdep install --from-paths ws/src --ignore-src -r -y || true

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          cd ws
          colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Run unit tests
        run: |
          source /opt/ros/humble/setup.bash
          source ws/install/setup.bash || true
          source .venv/bin/activate
          pytest -q --maxfail=1 --disable-warnings || true

      - name: Run colcon tests (integration/launch tests)
        run: |
          source /opt/ros/humble/setup.bash
          cd ws
          # run package tests (includes launch tests under package test/launch)
          colcon test --packages-select omx_variable_stiffness_controller --event-handlers console_direct+
          colcon test-result --verbose

      - name: Collect test artifacts
        # always collect so results are available even on success
        if: always()
        run: |
          mkdir -p artifacts
          # copy any gazebo screenshots or logs that the tests might have
          cp /tmp/gz*.png artifacts/ 2>/dev/null || true
          cp /tmp/*.log artifacts/ 2>/dev/null || true
          # workspace-specific logs
          cp -r ws/logs artifacts/ 2>/dev/null || true

      - uses: actions/upload-artifact@v3
        with:
          name: test-artifacts
          path: artifacts
